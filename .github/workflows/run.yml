name: Generate LRC from YouTube Music

on:
  workflow_dispatch:
    inputs:
      ytm_url:
        description: 'YouTube MusicのURL、またはビデオID'
        required: true
        default: 'https://music.youtube.com/watch?v=F8e2ohz1Jwg&si=DyQmP_DJHnm6joj9'
      delay_sec:
        description: '遅延させる秒数（例: 24、マイナスも可）'
        required: true
        default: '24'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ytmusicapi

    - name: Run script
      env:
        YTM_URL: ${{ github.event.inputs.ytm_url }}
        DELAY_SEC: ${{ github.event.inputs.delay_sec }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f result.html ]; then
          git add result.html
          git commit -m "Update lyrics result" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
        else
          echo "Error: result.html was not generated."
          exit 1
        fi
