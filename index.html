<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTM LRC 歌詞抽出コントローラー</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; color: #333; line-height: 1.5; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-size: 1.3rem; text-align: center; }
        .form-group { margin-top: 12px; }
        label { font-size: 0.9rem; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        input, button { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; }
        input:focus { border-color: #007bff; outline: none; }
        button { background-color: #111; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #333; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #666; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>YouTube Music LRC変換</h2>
    <p style="font-size:0.85rem; color:#666; text-align:center;">URLを入力して実行すると、裏で自動処理が始まります。</p>
    
    <div class="form-group">
        <label for="url_input">YouTube MusicのURL、またはビデオID</label>
        <input type="text" id="url_input" placeholder="https://music.youtube.com/watch?v=...">
    </div>

    <div class="form-group">
        <label for="delay_input">遅延させる秒数</label>
        <input type="number" id="delay_input" value="24">
    </div>

    <div class="form-group">
        <label for="token_input">GitHub パーソナルアクセストークン (PAT)</label>
        <input type="password" id="token_input" placeholder="github_pat_...（お使いのPC内に暗号化されず保存されます）">
    </div>

    <button id="convert_btn" onclick="triggerWorkflow()">この設定でLRCを生成する</button>
    
    <div id="status_msg" class="status"></div>
</div>

<script>
// ページ読み込み時に、前回入力したトークンがあれば自動復元する
window.onload = function() {
    const savedToken = localStorage.getItem("gh_pat_lrc");
    if (savedToken) {
        document.getElementById("token_input").value = savedToken;
    }
}

async function triggerWorkflow() {
    const url = document.getElementById("url_input").value.trim();
    const delay = document.getElementById("delay_input").value.trim();
    const token = document.getElementById("token_input").value.trim();
    const status = document.getElementById("status_msg");

    if (!url || !token) {
        status.innerText = "❌ URLとGitHubトークンを入力してください。";
        return;
    }

    // トークンをブラウザのローカルストレージに保存（コードには残らない）
    localStorage.setItem("gh_pat_lrc", token);

    status.innerText = "🚀 裏側で自動処理(Actions)を起動中...";

    const OWNER = "NTV142";
    const REPO = "Srt"; 
    const WORKFLOW_ID = "run.yml"; 

    const reqUrl = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`;

    try {
        const response = await fetch(reqUrl, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Accept": "application/vnd.github+v3+json",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                ref: "main",
                inputs: {
                    ytm_url: url,
                    delay_sec: delay
                }
            })
        });

        if (response.status === 204) {
            status.innerHTML = "⏳ 起動成功！約30〜40秒後に歌詞が生成されます。<br>処理が終わる頃にURLの末尾を <b>/result.html</b> に変えてアクセスしてください。";
        } else {
            const errData = await response.json();
            status.innerText = `❌ 起動失敗: ${errData.message}`;
        }
    } catch (e) {
        status.innerText = `❌ エラーが発生しました: ${e.message}`;
    }
}
</script>

</body>
</html>
